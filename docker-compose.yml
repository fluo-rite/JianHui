services:
  mysql:
    image: mysql:8.4
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-lowcode-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-jianhui-lowcode}
    ports:
      - "${MYSQL_HOST_PORT:-3306}:3306"
    volumes:
      - ./packages/server/src/scripts/init-schema.sql:/docker-entrypoint-initdb.d/001-init-schema.sql:ro
      - mysql-data:/var/lib/mysql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  backend:
    build:
      context: .
      dockerfile: server.Dockerfile
    restart: always
    environment:
      PORT: 3000
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USERNAME: root
      DB_PASSWORD: ${MYSQL_ROOT_PASSWORD:-lowcode-root}
      DB_DATABASE: ${MYSQL_DATABASE:-jianhui-lowcode}
      JWT_SECRET: ${JWT_SECRET:-change-me}
      ALI_OSS_REGION: ${ALI_OSS_REGION:-oss-cn-guangzhou}
      ALI_OSS_ACCESS_KEY_ID: ${ALI_OSS_ACCESS_KEY_ID:-}
      ALI_OSS_ACCESS_KEY_SECRET: ${ALI_OSS_ACCESS_KEY_SECRET:-}
      ALI_OSS_BUCKET: ${ALI_OSS_BUCKET:-}
      ALI_OSS_CUSTOM_DOMAIN: ${ALI_OSS_CUSTOM_DOMAIN:-}
    depends_on:
      mysql:
        condition: service_healthy

  release:
    build:
      context: .
      dockerfile: release.Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-/api}
        NEXT_PUBLIC_RELEASE_BASE_PATH: ${NEXT_PUBLIC_RELEASE_BASE_PATH:-/release}
    restart: always
    environment:
      PORT: 3000
      API_INTERNAL_BASE_URL: http://backend:3000/api
    depends_on:
      - backend

  client:
    build:
      context: .
      dockerfile: client.Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
        VITE_RELEASE_BASE_URL: ${VITE_RELEASE_BASE_URL:-http://localhost:3000/release}
    restart: always
    depends_on:
      - backend
      - release
    ports:
      - "${CLIENT_PORT:-3000}:80"

volumes:
  mysql-data:
