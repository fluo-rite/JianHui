name: Deploy To Aliyun

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      DEPLOY_ARCHIVE: jianhui-deploy.tar.gz
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
      STATIC_ROOT: ${{ secrets.STATIC_ROOT }}
      NGINX_ACTIVE_LINK: ${{ secrets.NGINX_ACTIVE_LINK }}
      NGINX_APP_CONF: ${{ secrets.NGINX_APP_CONF }}
      NGINX_MAINTENANCE_CONF: ${{ secrets.NGINX_MAINTENANCE_CONF }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build deploy archive
        run: |
          tar \
            --exclude=.git \
            --exclude=node_modules \
            --exclude=packages/*/node_modules \
            --exclude=packages/*/dist \
            --exclude=packages/*/.next \
            --exclude=packages/*/.turbo \
            --exclude=.DS_Store \
            -czf "$DEPLOY_ARCHIVE" .

      - name: Upload archive to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          source: ${{ env.DEPLOY_ARCHIVE }}
          target: /tmp

      - name: Deploy on server
        uses: appleboy/ssh-action@v1.0.3
        env:
          DEPLOY_PATH: ${{ env.DEPLOY_PATH }}
          STATIC_ROOT: ${{ env.STATIC_ROOT }}
          NGINX_ACTIVE_LINK: ${{ env.NGINX_ACTIVE_LINK }}
          NGINX_APP_CONF: ${{ env.NGINX_APP_CONF }}
          NGINX_MAINTENANCE_CONF: ${{ env.NGINX_MAINTENANCE_CONF }}
          PROD_ENV_FILE: ${{ secrets.PROD_ENV_FILE }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          envs: DEPLOY_PATH,STATIC_ROOT,NGINX_ACTIVE_LINK,NGINX_APP_CONF,NGINX_MAINTENANCE_CONF,PROD_ENV_FILE
          script: |
            set -eu
            test -n "$DEPLOY_PATH"
            test "$DEPLOY_PATH" != "/"
            mkdir -p "$DEPLOY_PATH"
            find "$DEPLOY_PATH" -mindepth 1 -maxdepth 1 -exec rm -rf {} +
            tar -xzf "/tmp/${{ env.DEPLOY_ARCHIVE }}" -C "$DEPLOY_PATH" --strip-components=1
            rm -f "/tmp/${{ env.DEPLOY_ARCHIVE }}"
            printf '%s\n' "$PROD_ENV_FILE" > "$DEPLOY_PATH/.env"
            chmod +x "$DEPLOY_PATH/scripts/deploy.sh"
            APP_DIR="$DEPLOY_PATH" \
            STATIC_ROOT="$STATIC_ROOT" \
            NGINX_ACTIVE_LINK="$NGINX_ACTIVE_LINK" \
            NGINX_APP_CONF="$NGINX_APP_CONF" \
            NGINX_MAINTENANCE_CONF="$NGINX_MAINTENANCE_CONF" \
            "$DEPLOY_PATH/scripts/deploy.sh"

      - name: Send failure email
        if: failure()
        uses: dawidd6/action-send-mail@v6
        with:
          server_address: ${{ secrets.SMTP_SERVER }}
          server_port: ${{ secrets.SMTP_PORT }}
          secure: false
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "[简汇部署失败] ${{ github.repository }} @ ${{ github.ref_name }}"
          to: ${{ secrets.ALERT_EMAIL_TO }}
          from: ${{ secrets.ALERT_EMAIL_FROM }}
          html_body: |
            <h2>简汇部署失败</h2>
            <p><strong>仓库：</strong>${{ github.repository }}</p>
            <p><strong>分支：</strong>${{ github.ref_name }}</p>
            <p><strong>提交人：</strong>${{ github.actor }}</p>
            <p><strong>提交 SHA：</strong>${{ github.sha }}</p>
            <p><strong>服务器：</strong>${{ secrets.SERVER_HOST }}</p>
            <p><strong>工作流：</strong>${{ github.workflow }}</p>
            <p><strong>运行编号：</strong>${{ github.run_number }}</p>
            <p><strong>查看日志：</strong><a href="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}">点击打开 GitHub Actions 日志</a></p>
