name: Deploy To Aliyun

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      DEPLOY_ARCHIVE: jianhui-release-bundle.tar.gz
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
      STATIC_ROOT: ${{ secrets.STATIC_ROOT }}
      RELEASE_ID: ${{ github.run_id }}-${{ github.run_attempt }}
      GIT_SHA: ${{ github.sha }}
      GIT_REF: ${{ github.ref_name }}
      CONTAINER_REGISTRY_HOST: ${{ secrets.CONTAINER_REGISTRY_HOST }}
      CONTAINER_IMAGE_REPOSITORY_PREFIX: ${{ secrets.CONTAINER_IMAGE_REPOSITORY_PREFIX }}
      CONTAINER_REGISTRY_USERNAME: ${{ secrets.CONTAINER_REGISTRY_USERNAME }}
      CONTAINER_REGISTRY_PASSWORD: ${{ secrets.CONTAINER_REGISTRY_PASSWORD }}
      BACKEND_IMAGE: ${{ secrets.CONTAINER_IMAGE_REPOSITORY_PREFIX }}/jianhui-backend:${{ github.run_id }}-${{ github.run_attempt }}
      RELEASE_IMAGE: ${{ secrets.CONTAINER_IMAGE_REPOSITORY_PREFIX }}/jianhui-release:${{ github.run_id }}-${{ github.run_attempt }}
      NGINX_ACTIVE_LINK: ${{ secrets.NGINX_ACTIVE_LINK }}
      NGINX_APP_CONF: ${{ secrets.NGINX_APP_CONF }}
      NGINX_MAINTENANCE_CONF: ${{ secrets.NGINX_MAINTENANCE_CONF }}
      SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
      SMTP_PORT: ${{ secrets.SMTP_PORT }}
      SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
      ALERT_EMAIL_FROM: ${{ secrets.ALERT_EMAIL_FROM }}
      ALERT_EMAIL_TO: ${{ secrets.ALERT_EMAIL_TO }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Enable pnpm cache
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared package
        run: pnpm build:share

      - name: Build client static assets
        env:
          VITE_API_BASE_URL: /api
          VITE_RELEASE_BASE_URL: https://fluorite.cyou/release
        run: pnpm build:client

      - name: Build backend image
        run: docker build -t "$BACKEND_IMAGE" -f server.Dockerfile .

      - name: Build release image
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_API_BASE_URL=/api \
            --build-arg NEXT_PUBLIC_RELEASE_BASE_PATH=/release \
            -t "$RELEASE_IMAGE" \
            -f release.Dockerfile \
            .

      - name: Login to registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.CONTAINER_REGISTRY_HOST }}
          username: ${{ env.CONTAINER_REGISTRY_USERNAME }}
          password: ${{ env.CONTAINER_REGISTRY_PASSWORD }}

      - name: Push backend image
        run: docker push "$BACKEND_IMAGE"

      - name: Push release image
        run: docker push "$RELEASE_IMAGE"

      - name: Prepare release bundle
        run: |
          BUNDLE_DIR="$RUNNER_TEMP/release-bundle"
          mkdir -p "$BUNDLE_DIR/static" "$BUNDLE_DIR/scripts" "$BUNDLE_DIR/db"

          cp -a packages/client/dist/. "$BUNDLE_DIR/static/"
          cp docker-compose.runtime.yml "$BUNDLE_DIR/"
          cp packages/server/src/scripts/init-schema.sql "$BUNDLE_DIR/db/init-schema.sql"
          cp scripts/deploy.sh scripts/rollback.sh scripts/release-manage.sh scripts/release-switch.sh "$BUNDLE_DIR/scripts/"

          printf 'BACKEND_IMAGE=%s\nRELEASE_IMAGE=%s\n' "$BACKEND_IMAGE" "$RELEASE_IMAGE" > "$BUNDLE_DIR/deploy-image.env"
          printf 'RELEASE_ID=%s\nGIT_SHA=%s\nGIT_REF=%s\n' "$RELEASE_ID" "$GIT_SHA" "$GIT_REF" > "$BUNDLE_DIR/release-meta.env"

          tar -czf "$RUNNER_TEMP/$DEPLOY_ARCHIVE" -C "$BUNDLE_DIR" .
          cp "$RUNNER_TEMP/$DEPLOY_ARCHIVE" "$DEPLOY_ARCHIVE"

      - name: Upload bundle to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          source: ${{ env.DEPLOY_ARCHIVE }}
          target: /tmp

      - name: Deploy on server
        uses: appleboy/ssh-action@v1.0.3
        env:
          DEPLOY_PATH: ${{ env.DEPLOY_PATH }}
          STATIC_ROOT: ${{ env.STATIC_ROOT }}
          RELEASE_ID: ${{ env.RELEASE_ID }}
          GIT_SHA: ${{ env.GIT_SHA }}
          GIT_REF: ${{ env.GIT_REF }}
          CONTAINER_REGISTRY_HOST: ${{ env.CONTAINER_REGISTRY_HOST }}
          CONTAINER_REGISTRY_USERNAME: ${{ env.CONTAINER_REGISTRY_USERNAME }}
          CONTAINER_REGISTRY_PASSWORD: ${{ env.CONTAINER_REGISTRY_PASSWORD }}
          NGINX_ACTIVE_LINK: ${{ env.NGINX_ACTIVE_LINK }}
          NGINX_APP_CONF: ${{ env.NGINX_APP_CONF }}
          NGINX_MAINTENANCE_CONF: ${{ env.NGINX_MAINTENANCE_CONF }}
          PROD_ENV_FILE: ${{ secrets.PROD_ENV_FILE }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          envs: DEPLOY_PATH,STATIC_ROOT,RELEASE_ID,GIT_SHA,GIT_REF,CONTAINER_REGISTRY_HOST,CONTAINER_REGISTRY_USERNAME,CONTAINER_REGISTRY_PASSWORD,NGINX_ACTIVE_LINK,NGINX_APP_CONF,NGINX_MAINTENANCE_CONF,PROD_ENV_FILE
          script: |
            set -eu
            run_as_root() {
              sudo "$@"
            }
            test -n "$DEPLOY_PATH"
            test "$DEPLOY_PATH" != "/"
            DEPLOY_ROOT="$(dirname "$DEPLOY_PATH")"
            SOURCE_DIR="$DEPLOY_ROOT/incoming/$RELEASE_ID"
            run_as_root rm -rf "$SOURCE_DIR"
            run_as_root mkdir -p "$SOURCE_DIR"
            run_as_root mkdir -p "$DEPLOY_PATH"
            run_as_root tar -xzf "/tmp/${{ env.DEPLOY_ARCHIVE }}" -C "$SOURCE_DIR"
            run_as_root rm -f "/tmp/${{ env.DEPLOY_ARCHIVE }}"
            printf '%s\n' "$PROD_ENV_FILE" | run_as_root tee "$DEPLOY_PATH/.env" >/dev/null
            run_as_root chmod +x "$SOURCE_DIR/scripts/deploy.sh" "$SOURCE_DIR/scripts/rollback.sh" "$SOURCE_DIR/scripts/release-manage.sh" "$SOURCE_DIR/scripts/release-switch.sh"
            APP_DIR="$DEPLOY_PATH" \
            SOURCE_DIR="$SOURCE_DIR" \
            STATIC_ROOT="$STATIC_ROOT" \
            RELEASE_ID="$RELEASE_ID" \
            GIT_SHA="$GIT_SHA" \
            GIT_REF="$GIT_REF" \
            CONTAINER_REGISTRY_HOST="$CONTAINER_REGISTRY_HOST" \
            CONTAINER_REGISTRY_USERNAME="$CONTAINER_REGISTRY_USERNAME" \
            CONTAINER_REGISTRY_PASSWORD="$CONTAINER_REGISTRY_PASSWORD" \
            NGINX_ACTIVE_LINK="$NGINX_ACTIVE_LINK" \
            NGINX_APP_CONF="$NGINX_APP_CONF" \
            NGINX_MAINTENANCE_CONF="$NGINX_MAINTENANCE_CONF" \
            "$SOURCE_DIR/scripts/release-manage.sh" deploy

      - name: Send failure email
        if: ${{ failure() && env.SMTP_SERVER != '' && env.SMTP_PORT != '' && env.SMTP_USERNAME != '' && env.SMTP_PASSWORD != '' && env.ALERT_EMAIL_FROM != '' && env.ALERT_EMAIL_TO != '' }}
        uses: dawidd6/action-send-mail@v6
        with:
          server_address: ${{ env.SMTP_SERVER }}
          server_port: ${{ env.SMTP_PORT }}
          secure: false
          username: ${{ env.SMTP_USERNAME }}
          password: ${{ env.SMTP_PASSWORD }}
          subject: "[简汇部署失败] ${{ github.repository }} @ ${{ github.ref_name }}"
          to: ${{ env.ALERT_EMAIL_TO }}
          from: ${{ env.ALERT_EMAIL_FROM }}
          html_body: |
            <h2>简汇部署失败</h2>
            <p><strong>仓库：</strong>${{ github.repository }}</p>
            <p><strong>分支：</strong>${{ github.ref_name }}</p>
            <p><strong>提交人：</strong>${{ github.actor }}</p>
            <p><strong>提交 SHA：</strong>${{ github.sha }}</p>
            <p><strong>服务器：</strong>${{ secrets.SERVER_HOST }}</p>
            <p><strong>工作流：</strong>${{ github.workflow }}</p>
            <p><strong>运行编号：</strong>${{ github.run_number }}</p>
            <p><strong>查看日志：</strong><a href="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}">点击打开 GitHub Actions 日志</a></p>
